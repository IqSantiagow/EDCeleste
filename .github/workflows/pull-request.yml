name: EDCeleste PR review

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  pull_request:
    types: [ opened, synchronize, ready_for_review, reopened ]
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  issues:
    types: [ opened, assigned ]

jobs:
  review:
    runs-on: ubuntu-latest
    environment: pr-action
    # Run on PR events, or on comments only when @claude is mentioned
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CC_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a senior code reviewer. Review ONLY the changes introduced in this pull request diff.

            ## Scope rules (CRITICAL)
            - Review EXCLUSIVELY the lines added or modified in this PR diff.
            - Do NOT flag issues in unchanged code, even if you spot problems there.
            - Do NOT expand the review scope beyond the PR's intent.
            - If the PR fixes a previous review — verify ONLY that the requested fixes were applied. Do not hunt for new issues in surrounding code.
            - When all changes look correct, say so clearly and approve.
            ## What to review
            1. Bugs or logical errors in the changed code
            2. Security vulnerabilities introduced by the changes
            3. Significant performance regressions
            4. Violations of existing code patterns/conventions visible in the diff context
            
            ## What to IGNORE
            - Style nitpicks (formatting, naming preferences) unless they break consistency
            - Missing features unrelated to the PR's goal
            - Pre-existing issues in unchanged code
            - Hypothetical edge cases with no realistic trigger
            ## Response format

            ### Summary
            One paragraph: what this PR does, whether the changes are correct, and the merge verdict (approve / request changes).

            ### Issues (only if found)
            For each real issue:
            - **File:line** — severity (bug | security | performance)
            - Description of the problem
            - Suggested fix (code snippet if helpful)

            If no issues found, write: "No issues found. Ready to merge."

            ### Maintenance notes (optional)
            Non-critical observations that could go into a weekly maintenance ticket. Keep to max 2-3 bullet points. Skip this section entirely if nothing worth noting

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
